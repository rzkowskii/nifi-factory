<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Not Found - NiFi Factory</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="canonical" href="https://nififactory.com/">
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b0a;
        --text: #e5f1e9;
        --muted: #9bad9f;
        --rule: #26342d;
        --green: #6ee7a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, calc(100% - 40px));
        border: 1px solid var(--rule);
        padding: 28px;
        background: #101613;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      a {
        color: var(--green);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Not found</h1>
      <p>This public GitHub repository does not publish the NiFi Factory source tree. Use the official site for the product.</p>
      <a href="https://nififactory.com/">Go to NiFi Factory</a>
    </main>
  </body>
</html>
